version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_secure_password
      POSTGRES_DB: bi_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bi_flask
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bi_user:bi_secure_password@db:5432/bi_dashboard
      FLASK_APP: app.py
      FLASK_ENV: production
      FLASK_DEBUG: 'False'
      SECRET_KEY: ${SECRET_KEY}   # from .env
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5001"
    volumes:
      - ./:/app
      - ./sql/analytics:/app/sql/analytics   # mount SQL files if needed
    command: gunicorn --bind 0.0.0.0:5001 --workers 4 --threads 2 --timeout 120 app:app

  nginx:
    image: nginx:alpine
    container_name: bi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro   # optional SSL certificates
    depends_on:
      - app
    command: /bin/sh -c "nginx -g 'daemon off;'"

volumes:
  postgres_data: